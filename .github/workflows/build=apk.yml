name: Build Flet APK

on:
  workflow_dispatch:

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi

      - name: 配置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 构建 APK
        run: |
          python -m flet build apk --name "芮城旅游端" --android-package-name com.ruicheng.travel --icon icon.png

    


    
